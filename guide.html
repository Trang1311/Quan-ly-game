<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hướng Dẫn Seller</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f5f5f0;color:#333;height:100vh;display:flex;flex-direction:column}

/* ===== TOP BAR ===== */
.topbar{
  display:flex;align-items:center;gap:12px;
  background:#E07B00;padding:12px 16px;
  box-shadow:0 2px 8px rgba(0,0,0,0.15);
  flex-shrink:0
}
.back-btn{
  padding:6px 14px;background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);
  border-radius:8px;font-size:13px;color:#fff;cursor:pointer;
  text-decoration:none;font-weight:600;transition:0.2s;white-space:nowrap
}
.back-btn:hover{background:rgba(255,255,255,0.35)}
.topbar h1{font-size:17px;font-weight:700;color:#fff;flex:1}
.topbar .sub{font-size:12px;color:rgba(255,255,255,0.75);white-space:nowrap}

/* ===== NOTE BAR ===== */
.notebar{
  background:#7a0000;border-bottom:2px solid #ff0000;
  padding:8px 16px;text-align:center;
  font-size:13px;font-weight:800;color:#ff4444;
  animation:blink-warn 0.8s step-start infinite;
  text-transform:uppercase;letter-spacing:0.5px;
  flex-shrink:0
}
@keyframes blink-warn{0%,100%{opacity:1}50%{opacity:0.25}}

/* ===== IFRAME ===== */
.sheet-wrap{flex:1;overflow:hidden;background:#fff}
.sheet-wrap iframe{
  width:100%;height:100%;
  border:none;display:block
}

/* ===== LOADING ===== */
.loading{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;background:#f5f5f0;
  gap:12px;font-size:14px;color:#888;z-index:10
}
.spinner{
  width:36px;height:36px;border:3px solid #e0e0d8;
  border-top-color:#E07B00;border-radius:50%;
  animation:spin 0.8s linear infinite
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="index.html">← Trang chủ</a>
  <h1>📖 Hướng Dẫn Login Game</h1>
  <span class="sub">Cập nhật tự động từ Google Sheets</span>
</div>

<div class="notebar">
  🚨 Mọi game đều phải quay video từng bước — rõ ngày tháng mail nhận & tên mail gửi 🚨
</div>

<div class="sheet-wrap" style="position:relative">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <span>Đang tải hướng dẫn...</span>
  </div>
  <iframe
    id="sheet-frame"
    src="https://docs.google.com/spreadsheets/d/e/2PACX-1vR9ztkXyLoz-wpWwSRH6GnjiMrWvU5kN2QB_sWVWwZI5bcQiFCwhMVoOdRwTpBRpg/pubhtml?widget=true&amp;headers=false"
    onload="document.getElementById('loading').style.display='none'"
  ></iframe>
</div>

</body>
</html>
