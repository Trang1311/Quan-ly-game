<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hướng Dẫn Seller</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f5f5f0;color:#333;height:100vh;display:flex;flex-direction:column}



/* ===== NOTE BAR ===== */
.notebar{
  background:#7a0000;border-bottom:2px solid #ff0000;
  padding:8px 16px;text-align:center;
  font-size:13px;font-weight:800;color:#ff4444;
  animation:blink-warn 0.8s step-start infinite;
  text-transform:uppercase;letter-spacing:0.5px;
  flex-shrink:0
}
@keyframes blink-warn{0%,100%{opacity:1}50%{opacity:0.25}}

/* ===== IFRAME ===== */
.sheet-wrap{flex:1;overflow:hidden;background:#fff}
.sheet-wrap iframe{
  width:100%;height:100%;
  border:none;display:block
}

/* ===== LOADING ===== */
.loading{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;background:#f5f5f0;
  gap:12px;font-size:14px;color:#888;z-index:10
}
.spinner{
  width:36px;height:36px;border:3px solid #e0e0d8;
  border-top-color:#E07B00;border-radius:50%;
  animation:spin 0.8s linear infinite
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== GLOBAL NAV ===== */
.global-nav{
  display:flex;align-items:center;gap:4px;
  background:#1a1a1a;padding:0 12px;
  height:44px;flex-shrink:0;
  box-shadow:0 2px 8px rgba(0,0,0,0.25);
  position:sticky;top:0;z-index:200
}
.gnav-logo{
  font-size:20px;text-decoration:none;
  padding:0 10px 0 2px;margin-right:4px;
  border-right:1px solid #333;height:100%;
  display:flex;align-items:center
}
.gnav-item{
  padding:0 16px;height:100%;display:flex;align-items:center;
  text-decoration:none;font-size:13px;font-weight:600;
  color:#aaa;border-bottom:3px solid transparent;
  transition:0.15s;white-space:nowrap
}
.gnav-item:hover{color:#fff}
.gnav-item.green.active{color:#52B788;border-bottom-color:#52B788}
.gnav-item.blue.active{color:#60a5fa;border-bottom-color:#60a5fa}
.gnav-item.orange.active{color:#fb923c;border-bottom-color:#fb923c}

</style>
</head>
<body>
<!-- ===== GLOBAL NAV ===== -->
<nav class="global-nav">
  <a class="gnav-logo" href="index.html">🎮</a>
  <a class="gnav-item green" href="accounts.html">🎮 Tài Khoản</a>
  <a class="gnav-item blue" href="posts.html">📋 Bài Đăng</a>
  <a class="gnav-item orange active" href="guide.html">📖 Hướng Dẫn</a>
</nav>

<div class="notebar">
  🚨 Mọi game đều phải quay video từng bước — rõ ngày tháng mail nhận & tên mail gửi 🚨
</div>

<div class="sheet-wrap" style="position:relative">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <span>Đang tải hướng dẫn...</span>
  </div>
  <iframe
    id="sheet-frame"
    src="https://docs.google.com/spreadsheets/d/e/2PACX-1vR9ztkXyLoz-wpWwSRH6GnjiMrWvU5kN2QB_sWVWwZI5bcQiFCwhMVoOdRwTpBRpg/pubhtml?widget=true&amp;headers=false"
    onload="document.getElementById('loading').style.display='none'"
  ></iframe>
</div>

</body>
</html>
