<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Theo Dõi Bài Đăng</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f5f5f0;color:#333;padding:16px}

/* ===== STICKY HEADER ===== */
.sticky-header{
  background:#f5f5f0;
  padding:12px 0 10px;
}
h1{font-size:18px;font-weight:700;color:#2d2d2d}
/* ===== BLINKING WARNING ===== */
.note-warn{
  background:#7a0000;border:3px solid #ff0000;border-radius:8px;
  padding:14px 20px;font-size:20px;font-weight:900;color:#ff4444;
  margin-bottom:14px;text-align:center;
  animation:blink-warn 0.8s step-start infinite;
  text-shadow:0 0 8px #ff0000;text-transform:uppercase
}
@keyframes blink-warn{0%,100%{opacity:1}50%{opacity:0.25}}
/* ===== STATS ===== */
.post-stats{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.pstat{background:#fff;border:1px solid #e0e0d8;border-radius:8px;padding:10px 18px;display:flex;align-items:center;gap:10px;font-size:13px}
.dot{width:11px;height:11px;border-radius:50%}
.dot-p1{background:#3B6D11}.dot-pout{background:#A32D2D}
.stat-num{font-size:20px;font-weight:700}

/* ===== CONTROLS ===== */
.controls{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.controls input,.controls select{
  padding:9px 14px;border:1px solid #d8d8cc;border-radius:8px;
  font-size:14px;background:#fff;color:#333;outline:none;min-width:180px
}
.controls input:focus,.controls select:focus{border-color:#aaa}
.btn-add{
  padding:9px 18px;background:#1877F2;color:#fff;border:none;
  border-radius:8px;font-size:14px;cursor:pointer;font-weight:600;margin-left:auto
}
.btn-add:hover{background:#1558c0}

/* ===== TABLE ===== */
.table-wrap{background:#fff;border:1px solid #e0e0d8;border-radius:10px;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{
  background:#f0efe8;padding:10px 12px;text-align:left;font-weight:600;
  color:#555;border-bottom:1px solid #e0e0d8;white-space:nowrap
}
tbody td{padding:10px 12px;border-bottom:1px solid #f0efe8;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:#fafaf6}

/* ===== BADGES ===== */
.badge{display:inline-block;padding:3px 12px;border-radius:20px;font-size:12px;font-weight:600}
.badge-active{background:#d8f3dc;color:#1B4332}
.badge-expired{background:#f8d7da;color:#721C24}

/* ===== PAGE BADGE ===== */
.page-input{
  width:60px;padding:4px 8px;border:1px solid #ddd;border-radius:6px;
  font-size:13px;text-align:center;outline:none
}
.page-input:focus{border-color:#1877F2}

/* ===== BUTTONS ===== */
.btn-checkout{
  padding:6px 14px;border:none;border-radius:20px;background:#eee;
  font-size:12px;cursor:pointer;font-weight:600;color:#555;width:110px;transition:0.2s
}
.btn-checkout:hover{background:#ddd}
.btn-checkin{
  padding:6px 14px;border:none;border-radius:20px;
  background:linear-gradient(135deg,#52B788,#2D6A4F);
  font-size:12px;cursor:pointer;font-weight:600;color:#fff;width:110px;transition:0.2s
}
.btn-checkin:hover{transform:translateY(-1px);box-shadow:0 4px 10px rgba(0,0,0,0.15)}
.btn-edit{
  padding:5px 10px;border:none;border-radius:6px;background:#e9f5ff;
  color:#1d4ed8;font-size:12px;cursor:pointer;font-weight:600;transition:0.2s
}
.btn-edit:hover{background:#dbeafe}
.btn-del{
  padding:5px 10px;border:none;border-radius:6px;background:#ffeaea;
  color:#dc2626;font-size:12px;cursor:pointer;font-weight:600;transition:0.2s
}
.btn-del:hover{background:#fecaca}
.empty{text-align:center;padding:30px;color:#999;font-size:14px}

/* ===== MODAL ===== */
.modal-bg{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);
  align-items:center;justify-content:center;z-index:999
}
.modal-bg.show{display:flex}
.modal{
  background:#fff;border-radius:12px;padding:24px;width:380px;
  max-width:95vw;box-shadow:0 8px 30px rgba(0,0,0,0.15)
}
.modal h3{font-size:16px;font-weight:700;margin-bottom:18px;color:#2d2d2d}
.form-row{margin-bottom:13px}
.form-row label{display:block;font-size:12px;color:#666;margin-bottom:5px;font-weight:600}
.form-row input,.form-row select{
  width:100%;padding:8px 11px;border:1px solid #ddd;border-radius:7px;
  font-size:13px;color:#333;outline:none
}
.form-row input:focus,.form-row select:focus{border-color:#1877F2}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:16px}
.btn-save{
  padding:8px 20px;background:#1877F2;color:#fff;border:none;
  border-radius:7px;font-size:13px;cursor:pointer;font-weight:600
}
.btn-save:hover{background:#1558c0}
.btn-cancel{
  padding:8px 16px;border:1px solid #ccc;border-radius:7px;
  background:#fff;color:#555;font-size:13px;cursor:pointer
}
.btn-cancel:hover{background:#f5f5f0}

@media(max-width:600px){
  thead th:nth-child(1),tbody td:nth-child(1){display:none}
  .controls input,.controls select{min-width:120px}
}

/* ===== GLOBAL NAV ===== */
.global-nav-wrap{
  position:sticky;top:0;z-index:200;
  margin:-16px -16px 0;
}
.global-nav{
  display:flex;align-items:center;gap:0;
  background:#ffffff;
  height:46px;
  border-bottom:1px solid #e0e0d8;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
  padding:0 12px;
}
.gnav-logo{
  font-size:20px;text-decoration:none;
  padding:0 14px 0 4px;margin-right:8px;
  border-right:1px solid #e0e0d8;height:100%;
  display:flex;align-items:center
}
.gnav-item{
  padding:0 18px;height:100%;display:flex;align-items:center;
  text-decoration:none;font-size:13px;font-weight:600;
  color:#999;border-bottom:3px solid transparent;
  transition:0.15s;white-space:nowrap
}
.gnav-item:hover{color:#333;background:#f8f8f5}
.gnav-item.green.active{color:#2D6A4F;border-bottom-color:#2D6A4F;background:#f0faf4}
.gnav-item.blue.active{color:#1877F2;border-bottom-color:#1877F2;background:#f0f6ff}
.gnav-item.orange.active{color:#E07B00;border-bottom-color:#E07B00;background:#fff8f0}
.gnav-item.purple.active{color:#7C3AED;border-bottom-color:#7C3AED;background:#f5f0ff}
.global-notebar{
  background:#7a0000;border-bottom:2px solid #ff0000;
  padding:7px 16px;text-align:center;
  font-size:13px;font-weight:800;color:#ff4444;
  animation:blink-warn 0.8s step-start infinite;
  text-transform:uppercase;letter-spacing:0.3px;
}
</style>
</head>
<body>
<!-- ===== GLOBAL NAV ===== -->
<div class="global-nav-wrap">
  <nav class="global-nav">
    <a class="gnav-logo" href="index.html">🎮</a>
    <a class="gnav-item green" href="accounts.html">🎮 Tài Khoản</a>
  <a class="gnav-item green active" href="posts.html">📋 Bài Đăng</a>
  <a class="gnav-item orange" href="guide.html">📖 Hướng Dẫn</a>
  <a class="gnav-item purple" href="handover.html">📅 Bàn Giao</a>
  </nav>
  <div class="global-notebar">🚨 PA không đăng Email ảo — Đăng đúng Form — Vi phạm Sa Thải ngay 🚨</div>


<div class="sticky-header">
  <div class="post-stats">
    <div class="pstat"><div class="dot dot-p1"></div>Trang 1–4 (OK)<span class="stat-num" id="pcnt-ok">0</span></div>
    <div class="pstat"><div class="dot dot-pout"></div>Trang ≥5 (Checkout)<span class="stat-num" id="pcnt-out">0</span></div>
  </div>

  <div class="controls">
    <input type="text" id="post-search" placeholder="Tìm game..." oninput="renderPosts()">
    <select id="post-filter-forum" onchange="renderPosts()">
      <option value="">Tất cả Forum</option>
      <option value="Zeusx">Zeusx</option>
      <option value="PA">PA</option>
      <option value="Eldorado">Eldorado</option>
      <option value="IGV">IGV</option>
      <option value="Z2U">Z2U</option>
    </select>
    <select id="post-filter-status" onchange="renderPosts()">
      <option value="">Tất cả trạng thái</option>
      <option value="ok">✅ Trang 1–4</option>
      <option value="out">⛔ Checkout (≥5)</option>
    </select>
    <button class="btn-add" onclick="openAddPost()">+ Thêm Bài</button>
  </div>
</div>
</div>
<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>#</th><th>Game Name</th><th>Forum</th><th>Số Trang</th>
        <th>Trạng Thái</th><th>Check-in lần cuối</th><th>Note</th><th>Hành động</th>
      </tr>
    </thead>
    <tbody id="post-tbl-body"></tbody>
  </table>
</div>

<!-- Modal -->
<div class="modal-bg" id="modal-post">
  <div class="modal">
    <h3 id="modal-post-title">Thêm bài đăng</h3>
    <div class="form-row"><label>Game Name</label><input id="fp-game" type="text" placeholder="Nhập tên game..."></div>
    <div class="form-row"><label>Forum</label>
      <select id="fp-forum">
        <option value="Zeusx">Zeusx</option>
        <option value="PA">PA</option><option value="Eldorado">Eldorado</option>
        <option value="IGV">IGV</option><option value="Z2U">Z2U</option>
      </select>
    </div>
    <div class="form-row"><label>Số trang hiện tại</label>
      <input id="fp-page" type="number" min="1" value="1" placeholder="VD: 1">
    </div>
    <div class="form-row"><label>Ghi chú</label><input id="fp-note" type="text" placeholder="Tuỳ chọn..."></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modal-post')">Huỷ</button>
      <button class="btn-save" onclick="savePost()">Lưu</button>
    </div>
  </div>
</div>

<script type="module">
import { db, postRef, nowStr,
         addDoc, doc, updateDoc, deleteDoc, onSnapshot
} from './firebase.js';

let postData   = [];
let editPostId = null;

onSnapshot(postRef, snap => {
  postData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  renderPosts();
});

function getPostStatus(page) { return page >= 5 ? 'out' : 'ok'; }

window.renderPosts = function () {
  const q  = (document.getElementById('post-search').value || '').toLowerCase();
  const ff = document.getElementById('post-filter-forum').value;
  const fs = document.getElementById('post-filter-status').value;

  let cntOk = 0, cntOut = 0;
  postData.forEach(r => { r.page >= 5 ? cntOut++ : cntOk++; });
  document.getElementById('pcnt-ok').textContent  = cntOk;
  document.getElementById('pcnt-out').textContent = cntOut;

  const rows = postData.filter(r => {
    const st = getPostStatus(r.page);
    if (q  && !r.game.toLowerCase().includes(q)) return false;
    if (ff && r.forum !== ff) return false;
    if (fs && st !== fs) return false;
    return true;
  });

  let html = '';
  if (!rows.length) html = '<tr><td colspan="8"><div class="empty">Không có dữ liệu</div></td></tr>';

  rows.forEach((r, i) => {
    const st = getPostStatus(r.page);
    const statusBadge = st === 'ok'
      ? `<span class="badge badge-active">✅ Trang 1–4</span>`
      : `<span class="badge badge-expired">⛔ Checkout</span>`;
    const actionBtn = st === 'out'
      ? `<button class="btn-checkin"  onclick="postCheckin('${r.id}')">✅ Check-in</button>`
      : `<button class="btn-checkout" onclick="postCheckout('${r.id}')">⛔ Check-out</button>`;

    html += `<tr>
      <td>${i+1}</td>
      <td><b>${r.game}</b></td>
      <td>${r.forum}</td>
      <td><input class="page-input" type="number" min="1" value="${r.page}"
            onchange="updatePage('${r.id}', this.value)"
            onblur="updatePage('${r.id}', this.value)"></td>
      <td>${statusBadge}</td>
      <td>${r.checkin || '—'}</td>
      <td>${r.note || ''}</td>
      <td style="display:flex;gap:5px;flex-wrap:wrap">
        ${actionBtn}
        <button class="btn-edit" onclick="editPost('${r.id}')">Sửa</button>
        <button class="btn-del"  onclick="deletePost('${r.id}')">Xoá</button>
      </td>
    </tr>`;
  });
  document.getElementById('post-tbl-body').innerHTML = html;
};

window.openAddPost = function () {
  editPostId = null;
  document.getElementById('modal-post-title').textContent = 'Thêm bài đăng';
  document.getElementById('fp-game').value  = '';
  document.getElementById('fp-forum').value = 'Zeusx';
  document.getElementById('fp-page').value  = '1';
  document.getElementById('fp-note').value  = '';
  document.getElementById('modal-post').classList.add('show');
};

window.editPost = function (id) {
  const r = postData.find(x => x.id === id);
  editPostId = id;
  document.getElementById('modal-post-title').textContent = 'Sửa bài đăng';
  document.getElementById('fp-game').value  = r.game;
  document.getElementById('fp-forum').value = r.forum;
  document.getElementById('fp-page').value  = r.page;
  document.getElementById('fp-note').value  = r.note || '';
  document.getElementById('modal-post').classList.add('show');
};

window.savePost = async function () {
  const game  = document.getElementById('fp-game').value.trim();
  const forum = document.getElementById('fp-forum').value;
  const page  = parseInt(document.getElementById('fp-page').value) || 1;
  const note  = document.getElementById('fp-note').value.trim();
  if (!game) { alert('Nhập tên game!'); return; }
  if (editPostId) {
    await updateDoc(doc(db, 'posts', editPostId), { game, forum, page, note });
  } else {
    await addDoc(postRef, { game, forum, page, note, checkin: nowStr() });
  }
  closeModal('modal-post');
};

window.deletePost = async function (id) {
  if (confirm('Xoá bài đăng này?')) await deleteDoc(doc(db, 'posts', id));
};

window.updatePage = async function (id, val) {
  const page = Math.max(1, parseInt(val) || 1);
  await updateDoc(doc(db, 'posts', id), { page });
};

let lastPostClick = 0;
window.postCheckin = async function (id) {
  if (Date.now() - lastPostClick < 2000) { alert('Đừng spam 😅'); return; }
  lastPostClick = Date.now();
  await updateDoc(doc(db, 'posts', id), { page: 1, checkin: nowStr() });
};

window.postCheckout = async function (id) {
  await updateDoc(doc(db, 'posts', id), { page: 5 });
};

window.closeModal = function (id) {
  document.getElementById(id).classList.remove('show');
};
</script>
</body>
</html>
